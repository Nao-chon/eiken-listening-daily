<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英検2級 毎日リスニング</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* カレンダーのセルが正方形に近くなるよう調整 */
    .cal-cell {
      aspect-ratio: 1 / 1;
      min-height: 36px;
    }
    /* 音声プレイヤーのスタイル */
    audio {
      width: 100%;
    }
    /* アニメーション */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

<!-- ===== ヘッダー ===== -->
<header class="bg-blue-700 text-white shadow-md">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-headphones text-2xl"></i>
      <span class="text-lg font-bold tracking-wide">英検2級 毎日リスニング</span>
    </div>
    <span id="todayLabel" class="text-sm opacity-80"></span>
  </div>
</header>

<!-- ===== メインコンテンツ ===== -->
<main class="max-w-2xl mx-auto px-4 py-6">

  <!-- ホーム画面 -->
  <div id="homeView" class="fade-in">

    <!-- 「今日のレッスンを始める」ボタン -->
    <div class="mb-6">
      <button
        id="startTodayBtn"
        onclick="startToday()"
        class="w-full py-5 text-xl font-bold text-white rounded-2xl shadow-lg
               bg-gradient-to-r from-blue-500 to-blue-700
               active:scale-95 transition-transform"
      >
        <i class="fa-solid fa-play-circle mr-2"></i>今日のリスニングを始める
      </button>
      <p id="todayStatusMsg" class="mt-2 text-center text-sm text-gray-500"></p>
    </div>

    <!-- 月カレンダー -->
    <div class="bg-white rounded-2xl shadow p-4">
      <div class="flex items-center justify-between mb-3">
        <button onclick="prevMonth()" class="p-2 rounded-full hover:bg-gray-100 text-gray-600">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h2 id="calendarTitle" class="text-base font-bold text-gray-700"></h2>
        <button onclick="nextMonth()" class="p-2 rounded-full hover:bg-gray-100 text-gray-600">
          <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

      <!-- 曜日ヘッダー -->
      <div class="grid grid-cols-7 text-center text-xs text-gray-400 mb-1">
        <div>日</div><div>月</div><div>火</div><div>水</div>
        <div>木</div><div>金</div><div class="text-red-400">土</div>
      </div>

      <!-- カレンダー本体 -->
      <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-sm"></div>

      <!-- 凡例 -->
      <div class="flex gap-4 mt-3 text-xs text-gray-500 justify-center">
        <span><span class="inline-block w-3 h-3 rounded bg-yellow-400 mr-1"></span>リスニング完了</span>
        <span><span class="inline-block w-3 h-3 rounded bg-red-500 mr-1"></span>クイズ全問正解</span>
      </div>
    </div>

  </div><!-- /homeView -->

  <!-- レッスン画面 -->
  <div id="lessonView" class="hidden fade-in">

    <!-- 戻るボタン + タイトル -->
    <div class="flex items-center gap-2 mb-4">
      <button onclick="backToHome()" class="text-blue-600 hover:text-blue-800">
        <i class="fa-solid fa-arrow-left text-xl"></i>
      </button>
      <h2 id="lessonTitle" class="text-lg font-bold text-gray-800 flex-1 truncate"></h2>
    </div>

    <!-- ステップインジケーター -->
    <div class="flex gap-1 mb-5" id="stepIndicator">
      <!-- JS で生成 -->
    </div>

    <!-- ステップコンテンツ (JS で切り替え) -->
    <div id="stepContent" class="bg-white rounded-2xl shadow p-5 fade-in"></div>

  </div><!-- /lessonView -->

</main>

<!-- ===== JavaScript ===== -->
<script>
// ============================================================
// 定数・グローバル変数
// ============================================================
const STEPS = 5; // ステップ数
let lessonsData = {};   // lessons.json から読み込んだデータ
let currentLesson = null; // 現在表示中のレッスンデータ
let currentDate = '';     // 現在レッスン中の日付 (YYYY-MM-DD)
let currentStep = 1;      // 現在のステップ (1〜5)
let calYear  = 0;
let calMonth = 0; // 0-indexed

// ============================================================
// 初期化
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();

  // 今日の日付をヘッダーに表示
  document.getElementById('todayLabel').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  // lessons.json を読み込む
  try {
    const res = await fetch('data/lessons.json');
    if (!res.ok) throw new Error('fetch failed');
    lessonsData = await res.json();
  } catch(e) {
    console.error('lessons.json の読み込みに失敗しました:', e);
    lessonsData = {};
  }

  renderCalendar();
  updateTodayButton();
});

// ============================================================
// 日付ユーティリティ
// ============================================================
function toDateStr(y, m, d) {
  // m は 0-indexed
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function todayStr() {
  const n = new Date();
  return toDateStr(n.getFullYear(), n.getMonth(), n.getDate());
}

// ============================================================
// localStorage ユーティリティ
// ============================================================
function getProgress(dateStr) {
  // 返り値: null | { listening: bool, quiz_perfect: bool }
  const raw = localStorage.getItem(`progress-${dateStr}`);
  return raw ? JSON.parse(raw) : null;
}

function saveProgress(dateStr, data) {
  localStorage.setItem(`progress-${dateStr}`, JSON.stringify(data));
}

// ============================================================
// ホーム画面: 今日ボタンの状態更新
// ============================================================
function updateTodayButton() {
  const td = todayStr();
  const prog = getProgress(td);
  const btn  = document.getElementById('startTodayBtn');
  const msg  = document.getElementById('todayStatusMsg');

  if (!lessonsData[td]) {
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    msg.textContent = '本日のレッスンデータがありません';
    return;
  }

  if (prog && prog.listening) {
    // 完了済み
    btn.textContent = '✅ 今日のレッスンは完了しています';
    btn.disabled = true;
    btn.classList.add('opacity-70', 'cursor-default');
    if (prog.quiz_perfect) {
      msg.textContent = '🎉 クイズ全問正解！素晴らしい！';
      msg.classList.add('text-red-500', 'font-bold');
    } else {
      msg.textContent = 'リスニング完了済み。明日も頑張ろう！';
    }
  }
}

// ============================================================
// カレンダー
// ============================================================
function renderCalendar() {
  document.getElementById('calendarTitle').textContent =
    `${calYear}年 ${calMonth+1}月`;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  // 月の初日の曜日 (0=日)
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  // 月の最終日
  const lastDate = new Date(calYear, calMonth+1, 0).getDate();
  const td = todayStr();

  // 空白セル
  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement('div');
    blank.className = 'cal-cell';
    grid.appendChild(blank);
  }

  // 日付セル
  for (let d = 1; d <= lastDate; d++) {
    const dateStr = toDateStr(calYear, calMonth, d);
    const prog    = getProgress(dateStr);
    const hasLesson = !!lessonsData[dateStr];

    let bg = 'bg-gray-100 text-gray-400';
    let cursor = '';
    let title  = '';

    if (prog && prog.quiz_perfect) {
      bg = 'bg-red-500 text-white font-bold';
      title = 'クイズ全問正解！';
    } else if (prog && prog.listening) {
      bg = 'bg-yellow-400 text-gray-800 font-bold';
      title = 'リスニング完了';
    } else if (hasLesson) {
      bg = 'bg-blue-50 text-blue-700';
      cursor = 'cursor-pointer hover:bg-blue-100';
      title = 'レッスンあり';
    }

    // 今日は枠線を追加
    const isToday = (dateStr === td) ? 'ring-2 ring-blue-500' : '';

    const cell = document.createElement('div');
    cell.className = `cal-cell flex items-center justify-center rounded-lg text-xs ${bg} ${cursor} ${isToday}`;
    cell.textContent = d;
    cell.title = title;

    if (hasLesson && !(prog && prog.listening)) {
      cell.addEventListener('click', () => startLesson(dateStr));
    }

    grid.appendChild(cell);
  }
}

function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

// ============================================================
// レッスン開始
// ============================================================
function startToday() {
  startLesson(todayStr());
}

function startLesson(dateStr) {
  const lesson = lessonsData[dateStr];
  if (!lesson) return;

  // 完了済みチェック
  const prog = getProgress(dateStr);
  if (prog && prog.listening) {
    alert('このレッスンは既に完了しています。');
    return;
  }

  currentLesson = lesson;
  currentDate   = dateStr;
  currentStep   = 1;

  // タイトル表示
  document.getElementById('lessonTitle').textContent = lesson.title;

  // 画面切り替え
  document.getElementById('homeView').classList.add('hidden');
  document.getElementById('lessonView').classList.remove('hidden');

  renderStep();
}

function backToHome() {
  document.getElementById('lessonView').classList.add('hidden');
  document.getElementById('homeView').classList.remove('hidden');
  renderCalendar();
  updateTodayButton();
}

// ============================================================
// ステップインジケーター
// ============================================================
function renderStepIndicator() {
  const labels = ['1回目', 'テキスト', '内容確認', '単語', '最終聴き'];
  const cont = document.getElementById('stepIndicator');
  cont.innerHTML = '';
  labels.forEach((label, i) => {
    const step = i + 1;
    let cls = 'flex-1 text-center text-xs py-1 rounded ';
    if (step < currentStep)       cls += 'bg-green-100 text-green-700';
    else if (step === currentStep) cls += 'bg-blue-600 text-white font-bold';
    else                           cls += 'bg-gray-100 text-gray-400';
    const el = document.createElement('div');
    el.className = cls;
    el.textContent = label;
    cont.appendChild(el);
  });
}

// ============================================================
// ステップコンテンツ描画
// ============================================================
function renderStep() {
  renderStepIndicator();
  const cont = document.getElementById('stepContent');
  cont.innerHTML = '';
  cont.classList.remove('fade-in');
  void cont.offsetWidth; // reflow でアニメーションリセット
  cont.classList.add('fade-in');

  switch (currentStep) {
    case 1: renderStep1(cont); break;
    case 2: renderStep2(cont); break;
    case 3: renderStep3(cont); break;
    case 4: renderStep4(cont); break;
    case 5: renderStep5(cont); break;
  }
}

// --------- ステップ1: 1回目リスニング ---------
function renderStep1(cont) {
  cont.innerHTML = `
    <div class="text-center">
      <div class="text-3xl mb-3">🎧</div>
      <h3 class="text-lg font-bold text-gray-800 mb-1">ステップ 1</h3>
      <p class="text-sm text-gray-500 mb-5">1回目：音声のみで聞きましょう<br>まず内容を耳だけで捉えてみましょう。</p>
      <audio id="audio1" controls class="mb-5">
        <source src="${currentLesson.audio_url}" type="audio/mpeg" />
        お使いのブラウザは audio タグに対応していません。
      </audio>
      <br/>
      <button onclick="nextStep()" class="mt-4 w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-base hover:bg-blue-700 active:scale-95 transition">
        聞き終わったら次へ <i class="fa-solid fa-arrow-right ml-1"></i>
      </button>
    </div>`;
}

// --------- ステップ2: テキストを見ながら ---------
function renderStep2(cont) {
  // パッセージを段落ごとに分割して表示
  const paragraphs = currentLesson.passage.split('\n').filter(p => p.trim());
  const paraHTML = paragraphs.map(p => `<p class="mb-3 text-gray-700 leading-relaxed">${escapeHtml(p)}</p>`).join('');

  cont.innerHTML = `
    <div class="text-center mb-4">
      <div class="text-3xl mb-2">📖</div>
      <h3 class="text-lg font-bold text-gray-800 mb-1">ステップ 2</h3>
      <p class="text-sm text-gray-500">2回目：テキストを見ながら聞きましょう</p>
    </div>
    <audio controls class="mb-4">
      <source src="${currentLesson.audio_url}" type="audio/mpeg" />
    </audio>
    <div class="bg-gray-50 rounded-xl p-4 text-sm text-left mb-5 max-h-72 overflow-y-auto border border-gray-200">
      ${paraHTML}
    </div>
    <button onclick="nextStep()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-base hover:bg-blue-700 active:scale-95 transition">
      次へ（内容確認クイズ） <i class="fa-solid fa-arrow-right ml-1"></i>
    </button>`;
}

// --------- ステップ3: 内容理解クイズ (3択×3問) ---------
function renderStep3(cont) {
  const quiz = currentLesson.comprehension_quiz;
  let html = `
    <div class="text-center mb-4">
      <div class="text-3xl mb-2">❓</div>
      <h3 class="text-lg font-bold text-gray-800 mb-1">ステップ 3</h3>
      <p class="text-sm text-gray-500">内容理解チェック（3択 × ${quiz.length}問）</p>
    </div>
    <form id="compQuizForm">`;

  quiz.forEach((item, idx) => {
    html += `<div class="mb-5" id="comp-q-${idx}">
      <p class="font-semibold text-gray-800 mb-2 text-sm">Q${idx+1}. ${escapeHtml(item.q)}</p>`;
    item.options.forEach((opt, oi) => {
      html += `
        <label class="flex items-start gap-2 mb-1 cursor-pointer">
          <input type="radio" name="comp-${idx}" value="${oi}" class="mt-0.5 accent-blue-600">
          <span class="text-sm text-gray-700">${escapeHtml(opt)}</span>
        </label>`;
    });
    html += `<p class="hidden text-xs mt-1 font-semibold" id="comp-result-${idx}"></p>`;
    html += `</div>`;
  });

  html += `
    </form>
    <button onclick="submitCompQuiz()" id="compSubmitBtn"
      class="w-full py-3 bg-green-600 text-white rounded-xl font-bold text-base hover:bg-green-700 active:scale-95 transition">
      採点する <i class="fa-solid fa-check ml-1"></i>
    </button>
    <button onclick="nextStep()" id="compNextBtn" class="hidden mt-3 w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-base hover:bg-blue-700 active:scale-95 transition">
      次へ（単語クイズ） <i class="fa-solid fa-arrow-right ml-1"></i>
    </button>`;

  cont.innerHTML = html;
}

function submitCompQuiz() {
  const quiz = currentLesson.comprehension_quiz;
  let allAnswered = true;
  let score = 0;

  quiz.forEach((item, idx) => {
    const sel = document.querySelector(`input[name="comp-${idx}"]:checked`);
    if (!sel) { allAnswered = false; return; }
    const chosen = parseInt(sel.value);
    const resultEl = document.getElementById(`comp-result-${idx}`);
    resultEl.classList.remove('hidden');
    if (chosen === item.answer) {
      score++;
      resultEl.textContent = '✅ 正解！';
      resultEl.className = 'text-xs mt-1 font-semibold text-green-600';
    } else {
      resultEl.textContent = `❌ 不正解。正解: ${item.options[item.answer]}`;
      resultEl.className = 'text-xs mt-1 font-semibold text-red-500';
    }
    // ラジオボタンを無効化
    document.querySelectorAll(`input[name="comp-${idx}"]`).forEach(r => r.disabled = true);
  });

  if (!allAnswered) {
    alert('すべての問題に答えてください。');
    return;
  }

  document.getElementById('compSubmitBtn').classList.add('hidden');
  document.getElementById('compNextBtn').classList.remove('hidden');

  // スコア表示
  const scoreDiv = document.createElement('div');
  scoreDiv.className = 'text-center my-3 text-base font-bold ' + (score === quiz.length ? 'text-green-600' : 'text-blue-600');
  scoreDiv.textContent = `結果: ${score} / ${quiz.length} 問正解`;
  document.getElementById('compNextBtn').before(scoreDiv);
}

// --------- ステップ4: 単語クイズ (4択×10問) ---------
function renderStep4(cont) {
  const quiz = currentLesson.vocab_quiz;
  let html = `
    <div class="text-center mb-4">
      <div class="text-3xl mb-2">📝</div>
      <h3 class="text-lg font-bold text-gray-800 mb-1">ステップ 4</h3>
      <p class="text-sm text-gray-500">英検2級よく出る単語チェック（4択 × ${quiz.length}問）</p>
    </div>
    <form id="vocabQuizForm">`;

  quiz.forEach((item, idx) => {
    html += `<div class="mb-5" id="vocab-q-${idx}">
      <p class="font-semibold text-gray-800 mb-2 text-sm">Q${idx+1}. ${escapeHtml(item.q)}</p>`;
    item.options.forEach((opt, oi) => {
      html += `
        <label class="flex items-start gap-2 mb-1 cursor-pointer">
          <input type="radio" name="vocab-${idx}" value="${oi}" class="mt-0.5 accent-blue-600">
          <span class="text-sm text-gray-700">${escapeHtml(opt)}</span>
        </label>`;
    });
    html += `<p class="hidden text-xs mt-1 font-semibold" id="vocab-result-${idx}"></p>`;
    html += `</div>`;
  });

  html += `
    </form>
    <button onclick="submitVocabQuiz()" id="vocabSubmitBtn"
      class="w-full py-3 bg-green-600 text-white rounded-xl font-bold text-base hover:bg-green-700 active:scale-95 transition">
      採点する <i class="fa-solid fa-check ml-1"></i>
    </button>
    <div id="vocabResultArea" class="hidden mt-3"></div>`;

  cont.innerHTML = html;
}

function submitVocabQuiz() {
  const quiz = currentLesson.vocab_quiz;
  let allAnswered = true;
  let score = 0;

  quiz.forEach((item, idx) => {
    const sel = document.querySelector(`input[name="vocab-${idx}"]:checked`);
    if (!sel) { allAnswered = false; return; }
    const chosen = parseInt(sel.value);
    const resultEl = document.getElementById(`vocab-result-${idx}`);
    resultEl.classList.remove('hidden');
    if (chosen === item.answer) {
      score++;
      resultEl.textContent = '✅ 正解！';
      resultEl.className = 'text-xs mt-1 font-semibold text-green-600';
    } else {
      resultEl.textContent = `❌ 不正解。正解: ${item.options[item.answer]}`;
      resultEl.className = 'text-xs mt-1 font-semibold text-red-500';
    }
    document.querySelectorAll(`input[name="vocab-${idx}"]`).forEach(r => r.disabled = true);
  });

  if (!allAnswered) {
    alert('すべての問題に答えてください。');
    return;
  }

  const isPerfect = (score === quiz.length);
  document.getElementById('vocabSubmitBtn').classList.add('hidden');

  const resultArea = document.getElementById('vocabResultArea');
  resultArea.classList.remove('hidden');
  resultArea.innerHTML = `
    <div class="text-center p-4 rounded-xl mb-3 ${isPerfect ? 'bg-red-50 border border-red-300' : 'bg-blue-50 border border-blue-200'}">
      <p class="text-lg font-bold ${isPerfect ? 'text-red-600' : 'text-blue-700'}">
        ${isPerfect ? '🎉 全問正解！素晴らしい！' : `${score} / ${quiz.length} 問正解`}
      </p>
      ${isPerfect ? '<p class="text-xs text-red-400 mt-1">カレンダーが赤くなります！</p>' : ''}
    </div>
    <button onclick="finishVocabAndNext(${isPerfect})"
      class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-base hover:bg-blue-700 active:scale-95 transition">
      最後の音声へ <i class="fa-solid fa-arrow-right ml-1"></i>
    </button>`;
}

function finishVocabAndNext(isPerfect) {
  // 単語クイズ全問正解フラグを一時保存（ステップ5完了後に localStorage へ書き込む）
  window._vocabPerfect = isPerfect;
  nextStep();
}

// --------- ステップ5: 最終リスニング ---------
function renderStep5(cont) {
  cont.innerHTML = `
    <div class="text-center">
      <div class="text-3xl mb-3">🎧</div>
      <h3 class="text-lg font-bold text-gray-800 mb-1">ステップ 5</h3>
      <p class="text-sm text-gray-500 mb-5">最後にもう一度、音声のみで聞きましょう<br>テキストの内容を思い浮かべながら聞いてみましょう。</p>
      <audio controls class="mb-5">
        <source src="${currentLesson.audio_url}" type="audio/mpeg" />
      </audio>
      <br/>
      <button onclick="completeLesson()" class="mt-4 w-full py-3 bg-yellow-500 text-white rounded-xl font-bold text-base hover:bg-yellow-600 active:scale-95 transition">
        <i class="fa-solid fa-flag-checkered mr-2"></i>レッスン完了！
      </button>
    </div>`;
}

// ============================================================
// レッスン完了処理
// ============================================================
function completeLesson() {
  const isPerfect = window._vocabPerfect || false;
  window._vocabPerfect = false;

  // localStorageに保存
  saveProgress(currentDate, { listening: true, quiz_perfect: isPerfect });

  // 完了メッセージ表示
  const cont = document.getElementById('stepContent');
  cont.innerHTML = `
    <div class="text-center py-6 fade-in">
      <div class="text-5xl mb-4">${isPerfect ? '🏆' : '🎉'}</div>
      <h3 class="text-xl font-bold text-gray-800 mb-2">今日のリスニング完了！</h3>
      <p class="text-sm text-gray-500 mb-1">${currentDate} のレッスンを終了しました。</p>
      ${isPerfect
        ? '<p class="text-red-500 font-bold text-base mt-2">🎊 単語クイズ全問正解！カレンダーが赤くなりました！</p>'
        : '<p class="text-yellow-600 font-semibold text-sm mt-2">カレンダーに黄色マークが付きました。</p>'
      }
      <button onclick="backToHome()" class="mt-6 w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-base hover:bg-blue-700 active:scale-95 transition">
        <i class="fa-solid fa-house mr-2"></i>ホームに戻る
      </button>
    </div>`;

  // ステップインジケーターを全完了状態に
  document.getElementById('stepIndicator').querySelectorAll('div').forEach(el => {
    el.className = 'flex-1 text-center text-xs py-1 rounded bg-green-100 text-green-700';
  });
}

// ============================================================
// ステップ移動
// ============================================================
function nextStep() {
  currentStep++;
  if (currentStep > STEPS) {
    completeLesson();
    return;
  }
  renderStep();
  // ページ上部へスクロール
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// ユーティリティ: HTML エスケープ
// ============================================================
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>
</body>
</html>
